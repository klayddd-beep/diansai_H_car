fire_event_bridge:
  ros__parameters:
    fire_udp_port: 8889
    reply_port: 8890
    # Reset duplicate filtering after a sender restart/stream interruption.
    seq_reset_timeout_s: 3.0
    final_status_redundancy: 3
    final_status_interval_ms: 50

fire_link_bridge:
  ros__parameters:
    # Aircraft/car communication agreement: telemetry in on 8892, start out on 8893.
    telemetry_udp_port: 8892
    # Fixed-router address of the aircraft. The car uses 192.168.10.113.
    drone_ip: "192.168.10.197"
    start_udp_port: 8893
    start_redundancy: 5
    start_interval_ms: 5
    seq_reset_timeout_s: 3.0
    # Optional physical button. Export/configure the GPIO as an input first, then
    # put its readable value file here (for example /sys/class/gpio/gpioNN/value).
    # Leave empty when using /drone_start or /drone_start_button instead.
    button_gpio_value_path: "/sys/class/gpio/gpio35/value"
    button_active_low: true
    button_debounce_ms: 50

fire_mission_manager:
  ros__parameters:
    # Calibration: arena(0,0) expressed in map coordinates. Measure before running.
    arena_origin_map_x_m: 0.0
    arena_origin_map_y_m: 0.0
    arena_origin_map_yaw_deg: 0.0
    home_x_dm: 13.5
    home_y_dm: 2.5
    standoff_dm: 4.0
    arrival_tol_dm: 1.2
    # The car must face the fire within this tolerance before the laser starts.
    aim_tol_deg: 8.0
    laser_on_s: 2.1
    grid_dm: 1.0
    safety_margin_dm: 1.5
    # Keep the car stopped during a transient pose failure; fail only after this
    # continuous grace period. Reject a cached Cartographer TF older than 0.5 s.
    pose_failure_timeout_s: 1.0
    tf_max_age_s: 0.5
    # A pose up to 3 dm beyond a boundary is warned about but remains usable.
    outside_arena_margin_dm: 3.0
    # [xmin, ymin, xmax, ymax, ...], arena dm. These are provisional estimates
    # from the contest figure and MUST be measured against the physical field.
    obstacles_dm: [6.0, 24.0, 18.0, 35.0,
                   23.0, 25.0, 31.0, 35.0,
                   37.0, 25.0, 45.0, 35.0,
                   6.0,  7.0, 15.0, 20.0,
                   20.0,  7.0, 32.0, 20.0,
                   37.0,  3.0, 45.0, 20.0]

fire_dashboard:
  ros__parameters:
    fullscreen: true
    headless: false
    window_width: 1280
    window_height: 720
    field_width_dm: 48.0
    field_height_dm: 40.0
    home_x_dm: 13.5
    home_y_dm: 2.5
    # Must remain identical to fire_mission_manager.obstacles_dm. ROS 2 Humble's
    # parameter parser does not support YAML aliases, so the array is explicit.
    obstacles_dm: [6.0, 24.0, 18.0, 35.0,
                   23.0, 25.0, 31.0, 35.0,
                   37.0, 25.0, 45.0, 35.0,
                   6.0,  7.0, 15.0, 20.0,
                   20.0,  7.0, 32.0, 20.0,
                   37.0,  3.0, 45.0, 20.0]
    history_limit: 20000
    link_timeout_s: 3.0

laser_gpio_driver:
  ros__parameters:
    # Orange Pi 5 Max physical pin 22: GPIO1_B0 / Linux GPIO 40 / wPi 13.
    # The measured idle HIGH level turns this laser interface OFF, so it is
    # active-low: LOW=ON, HIGH=OFF.
    mock_mode: false
    gpio_number: 40
    active_low: true
    gpio_command: "/usr/bin/gpio"
    startup_on: false
    max_on_s: 3.0
