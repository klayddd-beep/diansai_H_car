"/**":
  ros__parameters:
    # Authoritative arena geometry shared by every car-side node.
    # Coordinates are [xmin, ymin, xmax, ymax] in arena dm.
    field_width_dm: 48.0
    field_height_dm: 40.0
    takeoff_zone_dm: [0.0, 0.0, 7.0, 7.0]
    parking_zone_dm: [11.0, 0.0, 16.0, 5.0]
    home_x_dm: 13.5
    home_y_dm: 2.5
    # Figure-derived bounding boxes. Verify them against the physical field.
    obstacles_dm: [6.0, 26.0, 17.0, 35.0,
                   23.0, 26.0, 31.0, 35.0,
                   37.0, 26.0, 45.0, 35.0,
                   6.0, 11.0, 14.0, 20.0,
                   20.0, 11.0, 31.0, 20.0,
                   37.0,  5.0, 45.0, 20.0]

fire_event_bridge:
  ros__parameters:
    fire_udp_port: 8889
    reply_port: 8890
    # Used for status replies until the first fire packet teaches us the sender address.
    drone_ip: "10.42.0.1"
    # Reset duplicate filtering after a sender restart/stream interruption.
    seq_reset_timeout_s: 3.0
    final_status_redundancy: 3
    final_status_interval_ms: 50

fire_link_bridge:
  ros__parameters:
    # Aircraft/car communication agreement: telemetry in on 8892, start out on 8893.
    telemetry_udp_port: 8892
    # Fixed-router address of the aircraft. The car uses 192.168.10.113.
    drone_ip: "10.42.0.1"
    start_udp_port: 8893
    start_redundancy: 5
    start_interval_ms: 5
    seq_reset_timeout_s: 3.0
    # Optional physical button. Export/configure the GPIO as an input first, then
    # put its readable value file here (for example /sys/class/gpio/gpioNN/value).
    # Leave empty when using /drone_start or /drone_start_button instead.
    button_gpio_value_path: "/sys/class/gpio/gpio35/value"
    button_active_low: true
    button_debounce_ms: 50

fire_mission_manager:
  ros__parameters:
    # Calibration: arena(0,0) expressed in map coordinates.
    arena_origin_map_x_m: -0.25
    arena_origin_map_y_m: 1.35
    arena_origin_map_yaw_deg: -90.0
    arrival_tol_dm: 1.2
    # Accept fire coordinates slightly outside a district due to origin calibration residuals.
    district_match_tol_dm: 2.0
    # The car must face the fire within this tolerance before the laser starts.
    aim_tol_deg: 8.0
    laser_on_s: 2.1
    # Require explicit driver acknowledgements before timing exposure, returning,
    # or declaring the mission ready. Commands are retried while awaiting ACK.
    laser_ack_timeout_s: 0.5
    laser_startup_timeout_s: 3.0
    laser_command_retry_s: 0.1
    grid_dm: 1.0
    safety_margin_dm: 1.5
    # Keep the car stopped during a transient pose failure; fail only after this
    # continuous grace period. Reject a cached Cartographer TF older than 0.5 s.
    pose_failure_timeout_s: 1.0
    tf_max_age_s: 0.5
    # A pose up to 3 dm beyond a boundary is warned about but remains usable.
    outside_arena_margin_dm: 3.0
    # Camera fine alignment starts only after the fixed stop and map yaw are reached.
    vision_stable_frames: 8
    vision_error_deadband_x: 0.06
    vision_error_deadband_y: 0.06
    vision_kp_v_mps: 0.08
    vision_kp_w_rps: 0.60
    vision_v_max_mps: 0.04
    vision_w_max_rps: 0.20
    vision_search_w_rps: 0.12
    vision_search_yaw_deg: 15.0
    vision_timeout_s: 12.0
    vision_data_timeout_s: 0.5
    vision_lost_grace_s: 0.3
    vision_max_translation_dm: 2.0
    vision_safety_lookahead_dm: 0.5
    # One fixed stop point [x,y] below each obstacle, in the same order.
    # These provisional values must be measured and adjusted on the real field.
    district_stop_points_dm: [12.0, 22.0,
                              27.0, 23.0,
                              41.0, 23.0,
                              10.5,  5.0,
                              26.0,  5.0,
                              41.0,  1.0]

fire_vision:
  ros__parameters:
    # Stable by-id path for the connected 5M WDR camera. Do not silently fall
    # back to /dev/videoN because index numbers can change after a reboot.
    device_path: "/dev/v4l/by-id/usb-5M_WDR_Camera_5M_WDR_Camera_SN20210707-video-index0"
    capture_width: 640
    capture_height: 480
    capture_fps: 30.0
    processing_rate_hz: 15.0
    # The current mounting is upright after rotating the raw frame clockwise 90 degrees.
    rotate_cw_deg: 90
    flip_horizontal: false
    flip_vertical: false
    # Laser spot calibration on the oriented 480x640 image.  With the camera
    # lens about 11 cm above the ground, the beam hits the ground about 23 cm
    # ahead of the lens.  The unobstructed white-table calibration measured
    # the median spot center at (238.03, 282.67) px, so
    # visual alignment must place the fire here instead of at image center.
    aim_x_ratio: 0.4959
    aim_y_ratio: 0.4417
    roi: [0.08, 0.05, 0.92, 0.95]
    # Dual HSV red bands plus BGR red-dominance checks work for both printed
    # red targets and illuminated red LEDs. Tune on the competition field.
    hue_low_1: 0
    hue_high_1: 12
    hue_low_2: 168
    hue_high_2: 179
    saturation_min: 70
    value_min: 45
    red_min: 65
    red_over_green_min: 25
    red_over_blue_min: 20
    min_area_ratio: 0.0002
    max_area_ratio: 0.20
    morphology_open_px: 3
    morphology_close_px: 7
    track_memory_frames: 5
    camera_retry_s: 1.0
    # Keep the annotated image enabled for the dashboard's live camera view.
    publish_debug_image: true

fire_dashboard:
  ros__parameters:
    fullscreen: true
    headless: false
    window_width: 1280
    window_height: 720
    history_limit: 20000
    link_timeout_s: 3.0
    camera_timeout_s: 1.0

laser_gpio_driver:
  ros__parameters:
    # Orange Pi 5 Max physical pin 22: GPIO1_B0 / Linux GPIO 40 / wPi 13.
    # The measured idle HIGH level turns this laser interface OFF, so it is
    # active-low: LOW=ON, HIGH=OFF.
    mock_mode: false
    gpio_number: 40
    active_low: true
    gpio_command: "/usr/bin/gpio"
    startup_on: false
    max_on_s: 3.0
